openapi: 3.0.3
info:
  title: Languasia Backend API
  description: Language learning social platform backend API
  version: 1.0.0
  contact:
    name: Azat201003
servers:
  - url: http://localhost:8080
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    User:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
          example: 123
        username:
          type: string
          example: "johndoe"
        nickname:
          type: string
          example: "John"
        color:
          type: string
          example: "#FF0000"
        description:
          type: string
          example: "Language enthusiast"
        hobby_ids:
          type: array
          items:
            type: integer
            format: int64
          example: [1, 2, 3]
        known_language_ids:
          type: array
          items:
            type: integer
            format: int64
          example: [1, 2]
        learn_language_ids:
          type: array
          items:
            type: integer
            format: int64
          example: [3, 4]
      required:
        - user_id
        - username

    UserFilter:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        search_string:
          type: string
          example: "john"
        hobbies:
          type: array
          items:
            type: integer
            format: int64
        known_languages:
          type: array
          items:
            type: integer
            format: int64
        learn_languages:
          type: array
          items:
            type: integer
            format: int64
        page_size:
          type: integer
          format: int64
          maximum: 1000
        page_number:
          type: integer
          format: int64
          default: 1

    Credentials:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "johndoe"
        password:
          type: string
          format: password
          minLength: 2

    AuthResponse:
      type: object
      properties:
        refresh_token:
          type: string
          example: "abc123...xyz"
        jwt_token:
          type: string
          example: "eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9..."

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: "abc123...xyz"

    UpdateUserRequest:
      type: object
      properties:
        description:
          type: string
          example: "Updated bio"
        password:
          type: string
          format: password
          minLength: 2
        nickname:
          type: string
          example: "NewNickname"
        color:
          type: string
          example: "#00FF00"
        add_hobbies:
          type: array
          items:
            $ref: '#/components/schemas/UserHobby'
        delete_hobbies:
          type: array
          items:
            $ref: '#/components/schemas/UserHobby'
        add_languages:
          type: array
          items:
            $ref: '#/components/schemas/UserLanguage'
        delete_languages:
          type: array
          items:
            $ref: '#/components/schemas/UserLanguage'

    UserLanguage:
      type: object
      required:
        - language_id
        - is_known
      properties:
        language_id:
          type: integer
          format: int64
          example: 1
        is_known:
          type: boolean
          example: true

    UserHobby:
      type: object
      required:
        - hobby_id
      properties:
        hobby_id:
          type: integer
          format: int64
          example: 1

    Language:
      type: object
      properties:
        language_id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "English"

    Hobby:
      type: object
      properties:
        hobby_id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: "Reading"

    Chat:
      type: object
      properties:
        chat_id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: "Language Exchange Group"
        type:
          type: string
          example: "group"
        member_ids:
          type: array
          items:
            type: integer
            format: int64
          example: [123, 456]

    Error:
      type: object
      properties:
        message:
          type: string
          example: "Error description"

paths:
  /ping:
    get:
      summary: Health check endpoint
      operationId: ping
      responses:
        '200':
          description: Server is running
          content:
            text/plain:
              schema:
                type: string
                example: "pong"

  /register:
    post:
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credentials'
      responses:
        '200':
          description: User registered successfully
          content:
            text/plain:
              schema:
                type: string
                example: "Registered"
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /login:
    post:
      summary: Login user and get tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credentials'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /refresh:
    post:
      summary: Refresh JWT token using refresh token
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    get:
      summary: Get filtered list of users
      operationId: recieveFilteredUsers
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: search_string
          schema:
            type: string
        - in: query
          name: hobbies
          schema:
            type: array
            items:
              type: integer
              format: int64
          explode: false
          style: form
        - in: query
          name: known_languages
          schema:
            type: array
            items:
              type: integer
              format: int64
          explode: false
          style: form
        - in: query
          name: learn_languages
          schema:
            type: array
            items:
              type: integer
              format: int64
          explode: false
          style: form
        - in: query
          name: page_size
          schema:
            type: integer
            format: int64
            maximum: 1000
        - in: query
          name: page_number
          schema:
            type: integer
            format: int64
            default: 1
      responses:
        '200':
          description: List of users retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Invalid filter parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{user_id}:
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID of the user
    
    delete:
      summary: Delete a user
      operationId: deleteUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User deleted successfully
          content:
            text/plain:
              schema:
                type: string
                example: "User succefully deleted"
        '400':
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - token user_id and path user_id don't match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '418':
          description: Cannot delete user (Teapot error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    patch:
      summary: Update user information
      operationId: updateUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            text/plain:
              schema:
                type: string
                example: "Succesfully updated"
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - token user_id and path user_id don't match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{user_id}/languages:
    post:
      summary: Add a language to user's profile
      operationId: addLanguage
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLanguage'
      responses:
        '200':
          description: Language added successfully
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - token user_id and path user_id don't match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{user_id}/languages/{language_id}:
    delete:
      summary: Remove a language from user's profile
      operationId: deleteLanguage
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: language_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Language removed successfully
        '400':
          description: Invalid user_id or language_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - token user_id and path user_id don't match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{user_id}/hobbies:
    post:
      summary: Add a hobby to user's profile
      operationId: addHobby
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserHobby'
      responses:
        '200':
          description: Hobby added successfully
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - token user_id and path user_id don't match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{user_id}/hobbies/{hobby_id}:
    delete:
      summary: Remove a hobby from user's profile
      operationId: deleteHobby
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: hobby_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Hobby removed successfully
        '400':
          description: Invalid user_id or hobby_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - token user_id and path user_id don't match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /languages:
    get:
      summary: Get list of all languages
      operationId: getListLanguages
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of languages retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Language'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /hobbies:
    get:
      summary: Get list of all hobbies
      operationId: getListHobbies
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of hobbies retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Hobby'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{user_id}/chats:
    get:
      summary: Get user's chat list
      operationId: getChatList
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Chat list retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chat'
        '400':
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - token user_id and path user_id don't match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{user_id}/chats/{chat_id}:
    get:
      summary: Get specific chat details
      operationId: getChat
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Chat details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '400':
          description: Invalid user_id or chat_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - token user_id and path user_id don't match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: User is not a member of this chat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ws:
    get:
      summary: WebSocket connection endpoint for real-time communication
      operationId: connectWebSocket
      security:
        - BearerAuth: []
      responses:
        '101':
          description: Switching Protocols to WebSocket
        '400':
          description: Cannot find user or invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'