openapi: 3.0.0
info:
  title: Languasia API
  description: Language learning social network API
  version: 1.0.0
servers:
  - url: https://95.165.132.221/api
    description: Production server

paths:
  /ping:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: Server is running
          content:
            text/plain:
              example: pong

  /register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credentials'
      responses:
        '200':
          description: User registered successfully
          content:
            text/plain:
              example: Registered
        '400':
          description: Bad request - invalid data
        '422':
          description: Cannot create user

  /login:
    post:
      summary: Authenticate user and get tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credentials'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  refresh_token:
                    type: string
                  jwt_token:
                    type: string
        '401':
          description: Invalid credentials
        '422':
          description: Cannot find user
        '500':
          description: Internal server error

  /refresh:
    post:
      summary: Refresh JWT token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  refresh_token:
                    type: string
                  jwt_token:
                    type: string
        '401':
          description: Invalid refresh token

  /users:
    post:
      summary: Get filtered users list
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserFilter'
      responses:
        '200':
          description: List of filtered users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserWithDetails'
        '400':
          description: Invalid filter parameters
        '401':
          description: Unauthorized

  /users/{user_id}:
    delete:
      summary: Delete user account
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User deleted successfully
          content:
            text/plain:
              example: User successfully deleted
        '400':
          description: Invalid user ID
        '401':
          description: Unauthorized or user ID mismatch
        '418':
          description: Cannot delete user

    patch:
      summary: Update user information
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            text/plain:
              example: Successfully updated
        '400':
          description: Invalid request data
        '401':
          description: Unauthorized or user ID mismatch

  /users/{user_id}/languages:
    post:
      summary: Add language to user profile
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLanguage'
      responses:
        '200':
          description: Language added successfully
        '400':
          description: Invalid request data
        '401':
          description: Unauthorized or user ID mismatch

  /users/{user_id}/languages/{language_id}:
    delete:
      summary: Remove language from user profile
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
        - name: language_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Language removed successfully
        '400':
          description: Invalid IDs
        '401':
          description: Unauthorized or user ID mismatch

  /users/{user_id}/hobbies:
    post:
      summary: Add hobby to user profile
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserHobby'
      responses:
        '200':
          description: Hobby added successfully
        '400':
          description: Invalid request data
        '401':
          description: Unauthorized or user ID mismatch

  /users/{user_id}/hobbies/{hobby_id}:
    delete:
      summary: Remove hobby from user profile
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
        - name: hobby_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Hobby removed successfully
        '400':
          description: Invalid IDs
        '401':
          description: Unauthorized or user ID mismatch

  /chats:
    post:
      summary: Create a new chat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Chat'
      responses:
        '200':
          description: Chat created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  chat_id:
                    type: integer
        '400':
          description: Invalid chat data
        '401':
          description: Unauthorized

  /chats/{chat_id}/members/{user_id}:
    post:
      summary: Add user to chat
      security:
        - bearerAuth: []
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User added to chat successfully
        '400':
          description: Invalid chat or user ID
        '401':
          description: Unauthorized
        '403':
          description: User is not a member of the chat
        '418':
          description: Cannot add user to chat

  /languages:
    get:
      summary: Get list of available languages
      responses:
        '200':
          description: List of languages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Language'
        '500':
          description: Internal server error

  /hobbies:
    get:
      summary: Get list of available hobbies
      responses:
        '200':
          description: List of hobbies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Hobby'
        '500':
          description: Internal server error

  /users/{user_id}/chats:
    get:
      summary: Get user's chat list
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of user's chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chat'
        '400':
          description: Invalid user ID
        '401':
          description: Unauthorized or user ID mismatch

  /users/{user_id}/chats/{chat_id}:
    get:
      summary: Get specific chat details
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
        - name: chat_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Chat details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '400':
          description: Invalid IDs
        '401':
          description: Unauthorized or user ID mismatch
        '403':
          description: User is not a member of this chat

  /ws:
    get:
      summary: Establish WebSocket connection
      security:
        - bearerAuth: []
      responses:
        '101':
          description: WebSocket connection established
        '400':
          description: Cannot find user
        '401':
          description: Unauthorized

components:
  schemas:
    Credentials:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: User's username
        password:
          type: string
          description: User's password
          minLength: 2

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh token

    UserFilter:
      type: object
      properties:
        user_id:
          type: integer
          description: Filter by specific user ID
        search_string:
          type: string
          description: Search string for username/nickname/description
        hobbies:
          type: array
          items:
            type: integer
          description: Filter by hobby IDs
        known_languages:
          type: array
          items:
            type: integer
          description: Filter by known language IDs
        learn_languages:
          type: array
          items:
            type: integer
          description: Filter by learning language IDs
        page_size:
          type: integer
          description: Number of items per page
          maximum: 1000
        page_number:
          type: integer
          description: Page number

    UserWithDetails:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        nickname:
          type: string
        color:
          type: string
        description:
          type: string
        hobby_title_ids:
          type: array
          items:
            type: integer
        known_language_ids:
          type: array
          items:
            type: integer
        learn_language_ids:
          type: array
          items:
            type: integer

    UpdateUserRequest:
      type: object
      properties:
        description:
          type: string
          description: User's bio/description
        password:
          type: string
          description: New password (optional, min 2 characters)
          minLength: 2
        nickname:
          type: string
          description: User's nickname
        color:
          type: string
          description: User's color preference
        add_hobbies:
          type: array
          items:
            $ref: '#/components/schemas/UserHobby'
          description: Hobbies to add
        delete_hobbies:
          type: array
          items:
            $ref: '#/components/schemas/UserHobby'
          description: Hobbies to remove
        add_languages:
          type: array
          items:
            $ref: '#/components/schemas/UserLanguage'
          description: Languages to add
        delete_languages:
          type: array
          items:
            $ref: '#/components/schemas/UserLanguage'
          description: Languages to remove

    UserLanguage:
      type: object
      required:
        - language_id
        - is_known
      properties:
        language_id:
          type: integer
        is_known:
          type: boolean
          description: true for known language, false for learning language

    UserHobby:
      type: object
      required:
        - hobby_id
      properties:
        hobby_id:
          type: integer

    Chat:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          description: Chat title
        type:
          type: string
          description: Chat type
        member_ids:
          type: array
          items:
            type: integer
          description: Array of member user IDs

    Language:
      type: object
      properties:
        language_id:
          type: integer
        name:
          type: string

    Hobby:
      type: object
      properties:
        hobby_id:
          type: integer
        title:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login/refresh endpoints

security:
  - bearerAuth: []
