events {
    worker_connections 1024;
}

http {
    limit_req_zone $request_uri zone=by_uri:1m rate=120r/m;
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        
        location /health {
            limit_req zone=by_uri burst=5 nodelay;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        location / {
            return 301 https://$host$request_uri;
        }
    }
    # We remove the include for mime.types and set default_type
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # SSL configuration
    ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    server {
        listen 67 ssl;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location /api/docs/ { 
            limit_req zone=by_uri burst=5 nodelay;
            rewrite ^/api/docs/(.*) /$1 break;
            proxy_pass http://languasia-swagger-ui:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            #            add_header Access-Control-Allow-Origin "*";
            #add_header Access-Control-Allow-Methods "*";
            #add_header Access-Control-Allow-Headers "*";
git clone --recursive https://github.com/neutrinolabs/xrdp
            proxy_set_header X-Forwarded-Host $host;
                
            proxy_buffering off;
try_files auth =404;            proxy_request_buffering off;
            proxy_redirect off;
        }

        # API proxy
        location /api/ws {
            limit_req zone=by_uri burst=200 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://languasia-app:8080;
            proxy_set_header        Upgrade $http_upgrade;
            proxy_set_header        Connection "Upgrade";
            #proxy_set_header Host $host;
            #proxy_set_header X-Real-IP $remote_addr;
            #proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            #proxy_set_header X-Forwarded-Proto $scheme;
            #proxy_set_header Origin https://$host:$request_port;
            #            proxy_set_header X-Forwarded-Host $host;
            # CORS headers
            #add_header Access-Control-Allow-Origin "*";
            #add_header Access-Control-Allow-Methods "*";
            #add_header Access-Control-Allow-Headers "*";
            #add_header Allow "*"; # experimental

                
            proxy_buffering off;
            proxy_request_buffering off;
            #            proxy_redirect off;
        }
        #
        # API proxy
        location /api/ {
            limit_req zone=by_uri burst=5 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://languasia-app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            #      add_header Access-Control-Allow-Origin "*";
            #add_header Access-Control-Allow-Methods "*";
            #add_header Access-Control-Allow-Headers "*";
            #add_header Allow "*"; # experimental

            proxy_set_header X-Forwarded-Host $host;
                
            #proxy_buffering off;
            #proxy_request_buffering off;
            #            proxy_redirect off;
        }

        location /health {
            limit_req zone=by_uri burst=5 nodelay;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            limit_req zone=by_uri burst=5 nodelay;
            proxy_pass http://languasia-front;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
    server { 
        listen 443 ssl;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location /api/docs/ { 
            limit_req zone=by_uri burst=5 nodelay;
            rewrite ^/api/docs/(.*) /$1 break;
            proxy_pass http://languasia-swagger-ui:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "*";
            add_header Access-Control-Allow-Headers "*";

            proxy_set_header X-Forwarded-Host $host;
                
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_redirect off;
        }

        location /api/ws {
            limit_req zone=by_uri burst=5 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://languasia-app:8080;
            proxy_set_header        Upgrade $http_upgrade;
            proxy_set_header        Connection "Upgrade";
            #proxy_set_header Host $host;
            #proxy_set_header X-Real-IP $remote_addr;
            #proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            #proxy_set_header X-Forwarded-Proto $scheme;
            #proxy_set_header Origin https://$host:$request_port;
            #            proxy_set_header X-Forwarded-Host $host;
            # CORS headers
            #add_header Access-Control-Allow-Origin "*";
            #add_header Access-Control-Allow-Methods "*";
            #add_header Access-Control-Allow-Headers "*";
            #add_header Allow "*"; # experimental

                
            proxy_buffering off;
            proxy_request_buffering off;
            #            proxy_redirect off;
        }

        # API proxy
        location /api/ {
            limit_req zone=by_uri burst=5 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://languasia-app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            #add_header Access-Control-Allow-Origin "*";
            #add_header Access-Control-Allow-Methods "*";
            #add_header Access-Control-Allow-Headers "*";
            #add_header Allow "*"; # experimental

            proxy_set_header X-Forwarded-Host $host;
                
            #proxy_buffering off;
            #proxy_request_buffering off;
            #            proxy_redirect off;
        }
        
        location /health {
            limit_req zone=by_uri burst=5 nodelay;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            limit_req zone=by_uri burst=5 nodelay;
            root /var/www/html/loading;
            index page.html;
        }
    }
}
